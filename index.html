<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <title>Leaflet Kaart</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="main.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="main.js" defer></script>
    <style>
        #kaart { height: 500px; width: 100%; }
    </style>
</head>
<body>
    <h1>Mijn Leaflet kaart</h1>
    <h2>Punten: <span id="points"></span></h2>
    <div id="kaart"></div>
    <button onclick="getLocation()" id="refreshLocation"> get </button>
    <button onclick="checkLocation()" id="refreshLocation"> check </button>

    <script>
        if (!localStorage.getItem("initialized")) {
            localStorage.setItem("initialized", "true");
            localStorage.lat = Math.random() * (5.38591 - 5.38400) + 5.38400;
            localStorage.lng = Math.random() * (50.92825 - 50.92687) + 50.92687;
            
            location.reload();
        }

        document.getElementById("points").textContent = localStorage.points || 0;

        const kaart = L.map('kaart').setView([50.9275, 5.3850], 18);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(kaart);

        // BORDER
        var bounds = [[50.92825, 5.38400], [50.92687, 5.38591]];
        L.rectangle(bounds, {
            color: "#ff7800", // Randkleur
            weight: 2,        // Randdikte
            fillColor: "#ff7800", // Vulkleur
            fillOpacity: 0.5  // Transparantie
        }).addTo(kaart);

            const cirkel = L.circle([localStorage.lng, localStorage.lat], {
                color: 'yellow',
                fillColor: 'rgb(217, 255, 0)',
                fillOpacity: 0.3,
                radius: 25
            }).addTo(kaart);
            
        // Klik-event
        kaart.on('click', function (e) {
            L.popup()
                .setLatLng(e.latlng)
                .setContent('Coördinaten: ' + e.latlng.lat.toFixed(4) + ', ' + e.latlng.lng.toFixed(4))
                .openOn(kaart);
        });
    </script>
</body>
</html>
