<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <title>Leaflet Kaart</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="main.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="main.js" defer></script>
    <style>
        #kaart { height: 500px; width: 100%; }
    </style>
</head>
<body>
    <h1>Mijn Leaflet kaart</h1>
    <div id="kaart"></div>
    <button onclick="getLocation()" id="refreshLocation"></button>

    <script>
        const kaart = L.map('kaart').setView([50.92825, 5.38570], 17);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(kaart);

        // BORDER
        var bounds = [[50.92825, 5.38400], [50.92687, 5.38591]];
        L.rectangle(bounds, {
            color: "#ff7800", // Randkleur
            weight: 2,        // Randdikte
            fillColor: "#ff7800", // Vulkleur
            fillOpacity: 0.5  // Transparantie
        }).addTo(kaart).bindPopup('BORDER');

        // Klik-event
        kaart.on('click', function (e) {
            L.popup()
                .setLatLng(e.latlng)
                .setContent('Coördinaten: ' + e.latlng.lat.toFixed(4) + ', ' + e.latlng.lng.toFixed(4))
                .openOn(kaart);
        });
    </script>
</body>
</html>
